<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="개인용 할 일 관리 앱">
  <meta name="theme-color" content="#2E5A88">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <title>할 일 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <!-- 앱 제목 + 진행률 영역 -->
    <header id="header"></header>

    <!-- 날짜 탐색 영역 -->
    <nav id="date-nav"></nav>

    <!-- 입력 폼 영역 -->
    <section id="input-area">
      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          placeholder="할 일을 입력하세요"
          autocomplete="off"
          aria-label="할 일 입력"
          aria-describedby="input-error"
        >
<button type="button" id="add-btn" aria-label="할 일 추가">추가</button>
      </div>
      <p id="input-error" class="input-error" role="alert" hidden>내용을 입력해 주세요.</p>
    </section>

    <!-- 할 일 목록 영역 -->
    <section id="todo-list"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
